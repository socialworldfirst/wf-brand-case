<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst&#x27;s brand, made legible</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#FFFFFF;--ink:#16181D;--ink2:#4A4F58;--ink3:#8B909A;--hairline:#EAECEF;--accent:#E60054}
@media (prefers-color-scheme:dark){:root{--paper:#121317;--ink:#E8EAED;--ink2:#A9AEB8;--ink3:#6E7480;--hairline:#26292F;--accent:#FF4D7D}}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
::selection{background:rgba(230,0,84,.14)}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);z-index:50}
.gate-card{width:100%;max-width:340px;text-align:center}
.gate-kicker{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.gate-title{font-size:24px;font-weight:650;letter-spacing:-.01em;margin-bottom:24px}
#gate-form{display:flex;flex-direction:column;gap:10px}
#gate-input{font-size:15px;color:var(--ink);text-align:center;padding:12px 16px;border:1px solid var(--hairline);border-radius:10px;background:transparent;outline:none}
#gate-input:focus{border-color:var(--accent)}
#gate-btn{font-size:13px;font-weight:600;color:var(--paper);background:var(--ink);border:none;border-radius:10px;padding:12px 16px;cursor:pointer}
#gate-btn:hover{opacity:.88}
#gate-err{font-size:12px;color:var(--accent);min-height:16px;margin-top:6px}
body.locked{overflow:hidden}
body.locked #content{filter:blur(22px);pointer-events:none}

.layout{display:flex;max-width:1120px;margin:0 auto}
.side{position:sticky;top:0;align-self:flex-start;width:230px;min-width:230px;padding:44px 20px 44px 28px;height:100vh;overflow-y:auto;border-right:1px solid var(--hairline);display:flex;flex-direction:column;gap:2px}
.side-title{font-size:12px;font-weight:650;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.side a{display:block;font-size:13px;color:var(--ink2);text-decoration:none;padding:6px 8px;border-radius:7px;line-height:1.4}
.side a:hover{color:var(--ink)}
.side a.on{color:var(--ink);font-weight:600}
.side-foot{margin-top:auto;padding-top:20px;border-top:1px solid var(--hairline)}
.side-foot a{font-size:12.5px;color:var(--accent)!important}
.main{flex:1;min-width:0;padding:44px 40px 100px}
.board{max-width:860px;margin:0 auto}

.mast{margin-bottom:40px}
.eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}
h1{font-size:clamp(28px,4vw,40px);font-weight:700;letter-spacing:-.02em;line-height:1.12;margin-bottom:14px}
.dek{font-size:17px;color:var(--ink2);max-width:44em}
.dek a{color:var(--accent);text-decoration:none}

.sec{padding:36px 0;border-top:1px solid var(--hairline)}
.sec-num{font-size:12px;font-weight:650;color:var(--accent);letter-spacing:.1em;margin-bottom:8px}
h2{font-size:23px;font-weight:650;letter-spacing:-.012em;margin-bottom:16px;line-height:1.25}
h3{font-size:16.5px;font-weight:650;margin:26px 0 10px}
.sec p{margin-bottom:14px;color:var(--ink);max-width:46em}
.sec p strong{font-weight:650}
.fine{font-size:13px;color:var(--ink3);line-height:1.6}
.lock{color:var(--ink3);border-bottom:1px solid var(--hairline);text-decoration:none;padding-bottom:1px}
.lock:hover{color:var(--accent);border-color:var(--accent)}

.verdict-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:20px 0}
.v-card{border:1px solid var(--hairline);border-radius:14px;padding:22px 24px}
.v-status{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.12em;margin-bottom:10px}
.v-status.confirmed{color:var(--accent)}
.v-status.likely{color:var(--ink3)}
.v-card h3{margin:0 0 8px;font-size:17px}
.v-card p{font-size:14.5px;color:var(--ink2);margin:0;max-width:none}
.callout{border-left:2px solid var(--accent);padding:14px 20px;margin:22px 0;background:transparent}
.callout p{font-size:15px;margin:0;max-width:none;color:var(--ink)}

.chart-block{margin:26px 0}
.chart-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chart-title{font-size:14.5px;font-weight:650}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap}
.lg{font-size:12px;color:var(--ink2);display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.chart-block svg{width:100%;height:auto;display:block}
.ax{font-size:10px;fill:var(--ink3);font-family:inherit}
.ann{font-size:10.5px;fill:var(--ink2);font-family:inherit;font-weight:600}
.chart-note{font-size:13px;color:var(--ink3);margin-top:6px;max-width:46em}

table.tax{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
table.tax th{text-align:left;font-weight:650;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);padding:9px 12px;border-bottom:1px solid var(--hairline)}
table.tax td{padding:10px 12px;border-bottom:1px solid var(--hairline);vertical-align:top}
table.tax td strong{font-weight:650}

ol.moves,ol.asks{margin:14px 0 14px 22px}
ol.moves li,ol.asks li{margin-bottom:12px;color:var(--ink);max-width:46em}
ul{margin:12px 0 12px 22px}
ul li{margin-bottom:8px;max-width:46em}
code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:var(--hairline);padding:1px 5px;border-radius:4px}
.asks a{color:var(--accent);text-decoration:none}

@media (max-width:880px){
 .layout{flex-direction:column}
 .side{position:relative;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--hairline);padding:24px 22px;flex-direction:row;flex-wrap:wrap;gap:4px 14px}
 .side-title{width:100%}
 .side-foot{margin:0;padding:0;border:none}
 .main{padding:30px 22px 80px}
}
</style>
</head>

<div id="gate"><div class="gate-card">
<div class="gate-kicker">Internal</div>
<div class="gate-title">WorldFirst&#x27;s brand, made legible</div>

<input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
<button id="gate-btn" type="submit">Enter</button>
</form>
<div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function deriveKey(pw,salt,iters){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iters,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"])}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);
const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);
const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));
return new TextDecoder().decode(pt)}
function reveal(h){const c=document.getElementById('content');c.innerHTML=h;c.hidden=false;
document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initNav()}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input'),er=document.getElementById('gate-err');er.textContent='';
try{const h=await decryptPayload(i.value);reveal(h);try{localStorage.setItem('wfbrand_pw',i.value)}catch(_){}}
catch(x){er.textContent='wrong password';i.value='';i.focus()}return false}
(async()=>{try{const c=localStorage.getItem('wfbrand_pw');if(c){reveal(await decryptPayload(c))}}
catch(_){try{localStorage.removeItem('wfbrand_pw')}catch(_){}}})();
function initNav(){const nav=document.getElementById('sidenav');if(!nav)return;
const links=[...nav.querySelectorAll('a[href^="#"]')];const secs=links.map(l=>document.getElementById(l.getAttribute('href').slice(1))).filter(Boolean);
const onScroll=()=>{let cur=secs[0];for(const s of secs){if(s.getBoundingClientRect().top<140)cur=s}
links.forEach(l=>l.classList.toggle('on',l.getAttribute('href')==='#'+cur.id))};
document.addEventListener('scroll',onScroll,{passive:true});onScroll()}
</script>
