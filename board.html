<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>WF Brand Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:#FAF8F3;color:#191714;font-family:'Inter',-apple-system,sans-serif;font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(230,0,84,.12)}
.serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:#FAF8F3;z-index:50}
.gate-card{width:100%;max-width:340px;text-align:center}
.gate-kicker{font-size:10.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:#E60054;margin-bottom:14px}
.gate-title{font-family:'Instrument Serif',Georgia,serif;font-size:34px;line-height:1.05;margin-bottom:26px}
#gate-form{display:flex;flex-direction:column;gap:10px}
#gate-input{font-size:15px;color:#191714;text-align:center;padding:12px 16px;border:1px solid #E8E3D9;border-radius:10px;background:#fff;outline:none}
#gate-input:focus{border-color:#E60054}
#gate-btn{font-size:12.5px;font-weight:600;letter-spacing:.05em;color:#FAF8F3;background:#191714;border:none;border-radius:10px;padding:12px 16px;cursor:pointer}
#gate-btn:hover{opacity:.88}
#gate-err{font-size:12px;color:#E60054;min-height:16px;margin-top:6px}
body.locked{overflow:hidden}
body.locked #content{filter:blur(22px);pointer-events:none}

.wrap{max-width:880px;margin:0 auto;padding:0 30px}

/* cover */
.cover{min-height:92vh;display:flex;flex-direction:column;justify-content:center;padding:70px 0 50px;position:relative}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:#98938A;margin-bottom:30px}
.eyebrow b{color:#E60054;font-weight:600}
.cover h1{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(54px,9vw,104px);line-height:.98;letter-spacing:-.01em;margin-bottom:30px}
.cover h1 em{font-style:italic;color:#E60054}
.cover .dek{font-size:clamp(17px,2.2vw,20px);color:#5E5A52;max-width:36em;line-height:1.55;margin-bottom:44px}
.chips{display:flex;gap:12px;flex-wrap:wrap}
.chip{border:1px solid #E8E3D9;background:#fff;border-radius:12px;padding:14px 18px;min-width:200px;flex:1}
.chip .cs{font-size:10px;font-weight:700;letter-spacing:.14em;margin-bottom:5px}
.chip .cs.ok{color:#E60054} .chip .cs.mid{color:#98938A}
.chip .ct{font-size:13.5px;font-weight:600;line-height:1.35}
.chip .cx{font-size:12px;color:#5E5A52;margin-top:3px;line-height:1.45}
.scrollcue{position:absolute;bottom:26px;left:0;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#98938A}

/* sections */
.sec{padding:74px 0 30px}
.sec-head{display:flex;align-items:baseline;gap:16px;border-top:1px solid #191714;padding-top:18px;margin-bottom:10px}
.sec-no{font-size:12px;font-weight:700;letter-spacing:.12em;color:#E60054}
.sec h2{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(30px,4.4vw,42px);line-height:1.06;letter-spacing:-.005em}
.lede{font-size:17px;color:#5E5A52;max-width:44em;margin:14px 0 8px}
.sec p{max-width:44em;margin:14px 0;color:#191714}
.sec p.small{font-size:13px;color:#98938A;line-height:1.6;max-width:none}
h3{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#191714;margin:38px 0 12px}

/* stat band */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:0;border-top:1px solid #E8E3D9;border-bottom:1px solid #E8E3D9;margin:30px 0}
.stat{padding:24px 22px 22px;border-left:1px solid #E8E3D9}
.stat:first-child{border-left:none;padding-left:0}
.stat .sv{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(38px,4.6vw,52px);line-height:1;letter-spacing:-.01em}
.stat .sv em{font-style:italic;color:#E60054}
.stat .sk{font-size:12.5px;color:#5E5A52;margin-top:8px;line-height:1.5}
.stat .ss{font-size:11px;color:#98938A;margin-top:5px}

/* charts */
figure.chart{margin:30px 0 8px;background:#fff;border:1px solid #E8E3D9;border-radius:14px;padding:20px 22px 14px}
figure.chart figcaption{margin-bottom:12px}
.fig-take{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:20px;line-height:1.25;display:block;margin-bottom:3px}
.fig-name{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#98938A}
figure.chart svg{width:100%;height:auto;display:block}
.fig-src{font-size:11.5px;color:#98938A;margin-top:10px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.cl{font-size:12px;fill:#5E5A52;font-family:'Inter',sans-serif;font-weight:500}
.cv{font-size:12.5px;fill:#191714;font-family:'Inter',sans-serif;font-weight:600}
.cn{font-size:11px;fill:#98938A;font-weight:400}
.cw{font-size:11.5px;fill:#fff;font-family:'Inter',sans-serif;font-weight:600}
.ax{font-size:10px;fill:#98938A;font-family:'Inter',sans-serif}
.ann{font-size:10.5px;fill:#5E5A52;font-family:'Inter',sans-serif;font-weight:600}
.sl{font-size:11px;font-family:'Inter',sans-serif;font-weight:600}

/* case panels */
.cases{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:26px 0}
.case{background:#fff;border:1px solid #E8E3D9;border-radius:14px;padding:22px 24px}
.case .who{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#E60054;margin-bottom:8px}
.case .big{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:1.08;margin-bottom:8px}
.case p{font-size:13.5px;color:#5E5A52;margin:0 0 6px;max-width:none;line-height:1.55}
.case .src{font-size:11px;color:#98938A}

/* pull + tables */
.pull{border-left:2px solid #E60054;padding:6px 0 6px 24px;margin:34px 0;font-family:'Instrument Serif',Georgia,serif;font-size:clamp(22px,3vw,28px);line-height:1.3;max-width:30em}
table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13.5px;background:#fff;border:1px solid #E8E3D9;border-radius:12px;overflow:hidden}
th{text-align:left;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#98938A;font-weight:600;padding:11px 14px;border-bottom:1px solid #E8E3D9;background:#FAF8F3}
td{padding:11px 14px;border-bottom:1px solid #E8E3D9;vertical-align:top}
tr:last-child td{border-bottom:none}
td b{font-weight:650}

ol.asks{margin:20px 0 10px;counter-reset:a;list-style:none}
ol.asks li{counter-increment:a;padding:16px 0 16px 54px;position:relative;border-top:1px solid #E8E3D9;max-width:46em}
ol.asks li::before{content:counter(a,decimal-leading-zero);position:absolute;left:0;top:16px;font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:#E60054}
ol.asks b{font-weight:650}
a{color:#E60054;text-decoration:none}
.lock{color:#98938A;border-bottom:1px solid #E8E3D9}
.lock:hover{color:#E60054;border-color:#E60054}
.foot{padding:50px 0 80px;border-top:1px solid #E8E3D9;margin-top:60px;font-size:12.5px;color:#98938A;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
@media (max-width:760px){.grid2,.cases{grid-template-columns:1fr}.stat{border-left:none;padding-left:0}.cover{min-height:78vh}}
</style>
</head>
<body class="locked">
<div id="gate"><div class="gate-card">
<div class="gate-kicker">Internal</div>
<div class="gate-title">WF Brand Board</div>
<form id="gate-form" onsubmit="return gateSubmit(event)">
<input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
<button id="gate-btn" type="submit">Enter</button></form>
<div id="gate-err"></div></div></div>
<div id="content" hidden></div>

<script>
function b64b(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function dk(pw,salt,it){const e=new TextEncoder();const k=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);
return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},k,{name:"AES-GCM",length:256},false,["decrypt"])}
async function dec(pw){const b=JSON.parse(document.getElementById('payload').textContent);
const k=await dk(pw,b64b(b.salt),b.iterations);
const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64b(b.iv)},k,b64b(b.ciphertext));return new TextDecoder().decode(p)}
function reveal(h){const c=document.getElementById('content');c.innerHTML=h;c.hidden=false;
document.getElementById('gate').style.display='none';document.body.classList.remove('locked')}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input'),er=document.getElementById('gate-err');er.textContent='';
try{reveal(await dec(i.value));try{localStorage.setItem('wfbrand_pw',i.value)}catch(_){}}
catch(x){er.textContent='wrong password';i.value='';i.focus()}return false}
(async()=>{try{const c=localStorage.getItem('wfbrand_pw');if(c)reveal(await dec(c))}catch(_){try{localStorage.removeItem('wfbrand_pw')}catch(_){}}})();
</script>
